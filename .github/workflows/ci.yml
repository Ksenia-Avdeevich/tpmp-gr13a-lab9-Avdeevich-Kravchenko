name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i xcode || echo "No Xcode in /Applications"
          echo "=== Using default Xcode ==="
          xcodebuild -version

      - name: Use default Xcode (no switch)
        run: |
          # Просто показываем текущую версию, не переключаем
          xcodebuild -version
          echo "XCODE_VERSION=$(xcodebuild -version | head -1)" >> $GITHUB_ENV

      - name: List available iOS runtimes
        run: |
          echo "=== Available iOS Runtimes ==="
          xcrun simctl list runtimes | grep iOS

      - name: Find compatible simulator
        run: |
          # Автоматически ищем любой iOS 16 или 17 симулятор
          UDID=$(xcrun simctl list devices available | grep -E "iOS (1[6-9]|2[0-9])" | grep "iPhone" | head -1 | grep -oE '[A-F0-9-]{36}')
          
          if [ -z "$UDID" ]; then
            echo "No compatible simulator found, creating one..."
            # Пробуем создать iOS 16.4 (часто доступна)
            xcrun simctl create "Test iPhone" "iPhone 14" "com.apple.CoreSimulator.SimRuntime.iOS-16-4" || \
            xcrun simctl create "Test iPhone" "iPhone 14" "com.apple.CoreSimulator.SimRuntime.iOS-16-1" || \
            xcrun simctl create "Test iPhone" "iPhone 14" "iOS 16" || true
            
            UDID=$(xcrun simctl list devices | grep "Test iPhone" | grep -oE '[A-F0-9-]{36}')
          fi
          
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Using simulator UDID: $UDID"

      - name: Boot simulator
        run: |
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl list devices | grep "$SIMULATOR_UDID"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "id=$SIMULATOR_UDID" \
            -only-testing:MusicShopTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "id=$SIMULATOR_UDID" \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
