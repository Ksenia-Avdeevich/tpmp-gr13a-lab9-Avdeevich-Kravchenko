name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      - name: DEBUG - show repo structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== xcodeproj contents ==="
          ls -la MusicShop.xcodeproj/
          echo "=== Available schemes ==="
          xcodebuild -list -project MusicShop.xcodeproj
          echo "=== Available simulators ==="
          xcrun simctl list devices available | grep "iPhone 1" | head -10

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MusicShopTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
