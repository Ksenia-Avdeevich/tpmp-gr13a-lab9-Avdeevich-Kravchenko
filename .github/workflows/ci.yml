name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available | grep "iPhone" | head -10

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop/MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MusicShopTests \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop/MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult

      - name: Archive Build (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project MusicShop/MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'generic/platform=iOS Simulator' \
            -archivePath build/MusicShop.xcarchive \
            2>&1 | xcpretty --color

      - name: Upload Archive (main only)
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: MusicShop-archive
          path: build/MusicShop.xcarchive
