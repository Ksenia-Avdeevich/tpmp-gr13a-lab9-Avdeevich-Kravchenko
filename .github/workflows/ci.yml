name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ──────────────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ── 3. List available simulators ─────────────────────────────────────────
      - name: List simulators
        run: xcrun simctl list devices available --json | python3 -c "
import json, sys
data = json.load(sys.stdin)
for runtime, devs in data['devices'].items():
    for d in devs:
        if 'iPhone' in d.get('name',''):
            print(runtime, d['name'], d['udid'])
" | head -20

      # ── 4. Run Unit Tests ────────────────────────────────────────────────────
      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project MusicShop/MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MusicShopTests \
            -resultBundlePath TestResults/UnitTests.xcresult \
            | xcpretty --color --report junit --output TestResults/unit-test-results.xml

      # ── 5. Run UI Tests ──────────────────────────────────────────────────────
      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project MusicShop/MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            | xcpretty --color --report junit --output TestResults/ui-test-results.xml

      # ── 6. Upload test results ───────────────────────────────────────────────
      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult

      # ── 7. Publish test report ───────────────────────────────────────────────
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: always()
        with:
          files: |
            TestResults/unit-test-results.xml
            TestResults/ui-test-results.xml

      # ── 8. Build archive (only on main) ─────────────────────────────────────
      - name: Archive Build
        if: github.ref == 'refs/heads/main'
        run: |
          xcodebuild archive \
            -project MusicShop/MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination 'generic/platform=iOS Simulator' \
            -archivePath build/MusicShop.xcarchive \
            | xcpretty --color

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: MusicShop-archive
          path: build/MusicShop.xcarchive
