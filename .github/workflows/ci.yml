name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      - name: Create iOS 17.0 simulator
        run: |
          # Создаём симулятор с iOS 17.0
          SIM_NAME="iPhone 16 iOS17"
          xcrun simctl create "$SIM_NAME" "iPhone 16" "com.apple.CoreSimulator.SimRuntime.iOS-17-0" || true
          UDID=$(xcrun simctl list devices | grep "$SIM_NAME" | grep -oE '[A-F0-9-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Created simulator with UDID: $UDID"

      - name: Show chosen simulator
        run: echo "Using simulator $SIMULATOR_UDID"

      - name: Boot simulator
        run: |
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl list devices | grep "$SIMULATOR_UDID"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "id=$SIMULATOR_UDID" \
            -only-testing:MusicShopTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "id=$SIMULATOR_UDID" \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
