name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      - name: Find iPhone 16 simulator with iOS 18.5
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16 " | grep "18.5" | grep -v "Plus\|Pro\|Max" | head -1 | grep -oE '[A-F0-9-]{36}')
          if [ -z "$UDID" ]; then
            echo "iPhone 16 not found, trying any iPhone with iOS 18.5..."
            UDID=$(xcrun simctl list devices available | grep "iOS 18.5" -A 50 | grep "iPhone" | head -1 | grep -oE '[A-F0-9-]{36}')
          fi
          echo "UDID: $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Show chosen simulator
        run: echo "Using simulator $SIMULATOR_UDID"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "platform=iOS Simulator,OS=18.5,name=iPhone 16" \
            -only-testing:MusicShopTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "platform=iOS Simulator,OS=18.5,name=iPhone 16" \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
