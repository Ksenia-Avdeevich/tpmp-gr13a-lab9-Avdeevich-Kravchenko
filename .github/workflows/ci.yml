name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-13
    # macos-14 и macos-15 не имеют Xcode 14.0, используем macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode 14.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '14.0'

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS

      - name: Create iOS 16.0 simulator
        run: |
          SIM_NAME="iPhone 14 iOS16"
          xcrun simctl create "$SIM_NAME" "iPhone 14" "com.apple.CoreSimulator.SimRuntime.iOS-16-0"
          UDID=$(xcrun simctl list devices | grep "$SIM_NAME" | grep -oE '[A-F0-9-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Simulator UDID: $UDID"

      - name: Boot simulator
        run: |
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "id=$SIMULATOR_UDID" \
            -only-testing:MusicShopTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "id=$SIMULATOR_UDID" \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
