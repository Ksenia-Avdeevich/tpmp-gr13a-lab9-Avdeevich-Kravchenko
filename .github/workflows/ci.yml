name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      - name: Override Deployment Target to iOS 18.5
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 18.5/g' MusicShop.xcodeproj/project.pbxproj
          echo "Deployment targets after patch:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" MusicShop.xcodeproj/project.pbxproj

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create TestResults directory
        run: mkdir -p TestResults

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "platform=iOS Simulator,OS=18.5,name=iPhone 16" \
            -only-testing:MusicShopTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/UnitTests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MusicShop.xcodeproj \
            -scheme MusicShop \
            -destination "platform=iOS Simulator,OS=18.5,name=iPhone 16" \
            -only-testing:MusicShopUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            2>&1 | xcpretty --color
        continue-on-error: true

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
